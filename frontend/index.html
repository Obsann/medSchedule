<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MedSchedule - Doctor & Nurse Duty Schedule Management</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'en,am,om',
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </head>
  <body>
    <!-- Persistent Google Translate widget — lives outside React so it never gets destroyed -->
    <div id="google_translate_element" class="notranslate" style="position:fixed;bottom:16px;left:16px;z-index:9999;"></div>
    <div id="root"></div>

    <!-- Fix: Google Translate wraps text in <font> tags which breaks React's DOM reconciliation.
         This patch makes removeChild/insertBefore gracefully handle the node-parent mismatch. -->
    <script>
      if (typeof Node === 'function' && Node.prototype) {
        var _origRemoveChild = Node.prototype.removeChild;
        Node.prototype.removeChild = function(child) {
          if (child.parentNode !== this) {
            return child;
          }
          return _origRemoveChild.apply(this, arguments);
        };

        var _origInsertBefore = Node.prototype.insertBefore;
        Node.prototype.insertBefore = function(newNode, refNode) {
          if (refNode && refNode.parentNode !== this) {
            return newNode;
          }
          return _origInsertBefore.apply(this, arguments);
        };
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
